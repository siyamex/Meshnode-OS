---
# /etc/calamares/settings.conf — meshnode OS installer configuration
#
# Calamares reads this file on startup to know which pages to show (show:)
# and which operations to execute (exec:).

modules-search: [ local, /usr/lib/calamares/modules ]

# ── Pages shown to the user (wizard UI) ───────────────────────────────────────
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - shellprocess
    - bootloader
    - grubcfg
    - umount
  - show:
    - finished

branding: meshnode

# Prompt for confirmation before applying changes
prompt-install: true

# Allow the user to cancel during installation
dont-chroot: false
