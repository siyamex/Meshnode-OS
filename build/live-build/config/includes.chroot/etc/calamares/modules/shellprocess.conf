---
# shellprocess.conf — post-install scripts that run inside the installed
# system's chroot (chroot: true).
#
# Purpose: ensure the freshly-installed system runs the setup wizard exactly
# once on first boot, regardless of whether the wizard was run in the live
# session before installing.
#
# How it works:
#   1. Remove .firstboot-done so the wizard isn't skipped (it was written
#      during the live session when the user ran the wizard there).
#   2. Enable meshnode-wizard.service so it starts on the first real boot.
#
# The leading '-' before a command means "ignore failure" — safe on a fresh
# install where these paths may or may not exist yet.

# Run inside the installed system, not the live environment
chroot: true

script:
  # Clear the firstboot-done flag so the wizard runs on first boot
  - "-/bin/rm -f /etc/meshnode/.firstboot-done"

  # Ensure the wizard service is enabled (it may have been disabled if the
  # user ran the wizard and completed cluster setup in the live session)
  - "/bin/systemctl enable meshnode-wizard.service"

  # Pre-create the meshnode config directory with correct permissions
  - "/bin/install -m 755 -d /etc/meshnode"
