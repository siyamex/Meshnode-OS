---
# bootloader.conf — GRUB bootloader configuration.
#
# Calamares installs GRUB to the target disk's MBR (BIOS) or ESP (UEFI).
# The hybrid ISO boots both BIOS and UEFI systems; GRUB handles both.

efiBootLoader: "grub"
kernel: "/vmlinuz"
kernelLine: " quiet"
initramfs: "/initrd.img"
initramfsMultiple: true

# Fall back to installing GRUB in EFI fallback path (/EFI/BOOT/BOOTX64.EFI)
# so systems without a stored NVRAM entry can still boot.
installEFIFallback: true
