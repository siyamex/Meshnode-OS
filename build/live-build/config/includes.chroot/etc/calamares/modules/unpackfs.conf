---
# unpackfs.conf — copy the live filesystem squashfs to the target disk.
#
# In a Debian 12 live-build ISO booted via live-boot, the squashfs is
# mounted at /run/live/medium and the filesystem image is here:
unpack:
  - source: /run/live/medium/live/filesystem.squashfs
    sourcefs: squashfs
    destination: ""
