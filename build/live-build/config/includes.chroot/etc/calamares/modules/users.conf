---
# users.conf — user account creation during install.

# Default groups for the new user
defaultGroups:
  - users
  - sudo
  - docker
  - video
  - audio
  - netdev
  - plugdev

# Do not enable auto-login by default (wizard prints its URL; autologin
# would hide the TTY output)
doAutologin: false
autologinGroup: ""

# Allow the user to set the root password separately from their own password
setRootPassword: true

# Copy the user's password to root (one password, two accounts)
doReusePassword: false

# Minimum password requirements
passwordRequirements:
  nonempty: true
  minLength: 4

userShell: /bin/bash

# Write a hosts file entry for the chosen hostname
setHostname: true
writeHostsFile: true
